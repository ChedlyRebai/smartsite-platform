name: CD gestion-site

on:
  workflow_run:
    workflows:
      - "CI gestion-site"
    types:
      - completed
    branches:
      - main

jobs:
  cd:
    name: Deploy gestion-site
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Authentification au Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build et Push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: apps/backend/gestion-site
          file: apps/backend/gestion-site/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/smartsite-gestion-site:latest
            ${{ secrets.DOCKER_USERNAME }}/smartsite-gestion-site:${{ github.sha }}

      - name: Déploiement du conteneur
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/smartsite-gestion-site:latest
          docker stop smartsite-gestion-site || true
          docker rm smartsite-gestion-site || true
          docker run -d \
            --name smartsite-gestion-site \
            --restart unless-stopped \
            -p 3001:3001 \
            -e PORT=3001 \
            -e NODE_ENV=production \
            -e MONGODB_URI=${{ secrets.MONGODB_URI }} \
            ${{ secrets.DOCKER_USERNAME }}/smartsite-gestion-site:latest
          echo "✅ gestion-site déployé sur le port 3001"
