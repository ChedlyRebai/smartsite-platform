name: CI gestion-projects

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'apps/backend/gestion-projects/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'apps/backend/gestion-projects/**'

jobs:
  ci:
    name: Build & Test gestion-projects
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/backend/gestion-projects

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/backend/gestion-projects/package-lock.json

      - name: Installation des dépendances
        run: npm ci

      - name: Exécution des tests unitaires
        run: npm test

      - name: Build NestJS
        run: npm run build
