name: CD incident-management

on:
  workflow_run:
    workflows:
      - 'CI incident-management'
    branches:
      - main
    types:
      - completed

jobs:
  cd:
    name: Deploy incident-management
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build de l'image Docker
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/incident-management:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/incident-management:${{ github.sha }} \
            apps/backend/incident-management

      - name: Push de l'image Docker
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/incident-management:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/incident-management:${{ github.sha }}

      - name: Déploiement sur Kubernetes
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml
          kubectl set image deployment/incident-management \
            incident-management=${{ secrets.DOCKER_USERNAME }}/incident-management:${{ github.sha }} \
            -n smartsite
          kubectl rollout status deployment/incident-management -n smartsite

      - name: Confirmation du déploiement
        run: |
          echo "✅ incident-management déployé avec le tag ${{ github.sha }}"
