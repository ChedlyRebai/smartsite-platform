name: CD incident-management

on:
  workflow_run:
    workflows:
      - 'CI incident-management'
    types:
      - completed

jobs:
  cd:
    name: Deploy incident-management
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Vérification secrets Docker
        id: docker-check
        run: |
          if [ -n "${{ secrets.DOCKER_USERNAME }}" ] && [ -n "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "docker_available=true" >> $GITHUB_OUTPUT
          else
            echo "docker_available=false" >> $GITHUB_OUTPUT
            echo "⚠️ Secrets Docker non configurés - Build et push ignorés"
          fi

      - name: Connexion à Docker Hub
        if: steps.docker-check.outputs.docker_available == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build de l'image Docker
        if: steps.docker-check.outputs.docker_available == 'true'
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/incident-management:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/incident-management:${{ github.event.workflow_run.head_sha }} \
            apps/backend/incident-management

      - name: Push de l'image Docker
        if: steps.docker-check.outputs.docker_available == 'true'
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/incident-management:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/incident-management:${{ github.event.workflow_run.head_sha }}

      - name: Vérification secret Kubernetes
        id: k8s-check
        run: |
          if [ -n "${{ secrets.KUBECONFIG }}" ]; then
            echo "k8s_available=true" >> $GITHUB_OUTPUT
          else
            echo "k8s_available=false" >> $GITHUB_OUTPUT
            echo "⚠️ Secret KUBECONFIG non configuré - Déploiement ignoré"
          fi

      - name: Déploiement sur Kubernetes
        if: steps.docker-check.outputs.docker_available == 'true' && steps.k8s-check.outputs.k8s_available == 'true'
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d -i > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml
          kubectl config view
          kubectl set image deployment/incident-management \
            incident-management=${{ secrets.DOCKER_USERNAME }}/incident-management:${{ github.event.workflow_run.head_sha }} \
            -n smartsite
          kubectl rollout status deployment/incident-management -n smartsite --timeout=120s

      - name: Confirmation du déploiement
        run: echo "✅ incident-management déployé avec le tag ${{ github.event.workflow_run.head_sha }}"
